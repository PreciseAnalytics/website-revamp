<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     version="1.2" baseProfile="tiny-ps"
     viewBox="0 0 300 300" width="300" height="300">
  <title>Precise Analytics</title>

  <!-- Background — solid navy, no transparency -->
  <rect width="300" height="300" fill="#264882"/>

  <!-- ── X-pattern: two diagonals of teal circles ── -->

  <!-- Center intersection (largest) -->
  <circle cx="150" cy="122" r="15" fill="#00d8d8"/>

  <!-- NW arm (top-left) -->
  <circle cx="126" cy="98"  r="11"  fill="#00d8d8"/>
  <circle cx="108" cy="80"  r="8"   fill="#00d8d8"/>
  <circle cx="94"  cy="66"  r="5.5" fill="#00d8d8"/>
  <circle cx="83"  cy="55"  r="3.5" fill="#00cece"/>

  <!-- SE arm (bottom-right) -->
  <circle cx="174" cy="146" r="11"  fill="#00d8d8"/>
  <circle cx="192" cy="164" r="8"   fill="#00d8d8"/>
  <circle cx="206" cy="178" r="5.5" fill="#00d8d8"/>
  <circle cx="217" cy="189" r="3.5" fill="#00cece"/>

  <!-- NE arm (top-right) -->
  <circle cx="174" cy="98"  r="11"  fill="#00d8d8"/>
  <circle cx="192" cy="80"  r="8"   fill="#00d8d8"/>
  <circle cx="206" cy="66"  r="5.5" fill="#00d8d8"/>
  <circle cx="217" cy="55"  r="3.5" fill="#00cece"/>

  <!-- SW arm (bottom-left) -->
  <circle cx="126" cy="146" r="11"  fill="#00d8d8"/>
  <circle cx="108" cy="164" r="8"   fill="#00d8d8"/>
  <circle cx="94"  cy="178" r="5.5" fill="#00d8d8"/>
  <circle cx="83"  cy="189" r="3.5" fill="#00cece"/>

  <!-- Satellite accent dots -->
  <circle cx="150" cy="48"  r="3" fill="#00bfbf"/>
  <circle cx="150" cy="196" r="3" fill="#00bfbf"/>
  <circle cx="72"  cy="122" r="3" fill="#00bfbf"/>
  <circle cx="228" cy="122" r="3" fill="#00bfbf"/>
  <circle cx="104" cy="56"  r="2" fill="#00bfbf"/>
  <circle cx="196" cy="56"  r="2" fill="#00bfbf"/>
  <circle cx="104" cy="188" r="2" fill="#00bfbf"/>
  <circle cx="196" cy="188" r="2" fill="#00bfbf"/>

  <!-- ── Text ── -->
  <text x="150" y="230"
        font-family="Arial, Helvetica, sans-serif"
        font-size="32"
        font-weight="bold"
        fill="#80ff00"
        text-anchor="middle">PRECISE</text>

  <text x="150" y="263"
        font-family="Arial, Helvetica, sans-serif"
        font-size="32"
        font-weight="bold"
        fill="#80ff00"
        text-anchor="middle">ANALYTICS</text>

  <text x="150" y="284"
        font-family="Arial, Helvetica, sans-serif"
        font-size="11"
        fill="#ff6633"
        text-anchor="middle">YOUR DATA, OUR INSIGHTS</text>
</svg>
